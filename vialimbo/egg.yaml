uuid: 15658392-66f2-43c0-9756-58ad51416d7b
name: ViaLimbo
description: A lightweight Limbo server with ViaLimbo, strict Modrinth/Jenkins downloads, checksum verification where provided,
  and official Pterodactyl Java images.
author: GIGABAIT
config:
  files:
    server.properties:
      create_new: true
      parser: properties
      replace:
      - match: server-port
        insert_new: true
        update_existing: true
        if_value: null
        replace_with: '{{server.build.default.port}}'
      - match: velocity-modern
        insert_new: true
        update_existing: true
        if_value: null
        replace_with: '{{env.VELOCITY_ENABLED}}'
      - match: forwarding-secrets
        insert_new: true
        update_existing: true
        if_value: null
        replace_with: '{{env.VELOCITY_SECRET}}'
  startup:
    done:
    - Limbo server listening on
    strip_ansi: false
  stop:
    type: command
    value: stop
scripts:
  installation:
    container: ghcr.io/pterodactyl/installers:debian
    entrypoint: bash
    content: |
      #!/bin/bash
      set -euo pipefail

      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y --no-install-recommends jq ca-certificates
      rm -rf /var/lib/apt/lists/*
      cd /mnt/server
      versions_json="$(curl -fsSL -G --data-urlencode "game_versions=[\"${MINECRAFT_VERSION}\"]" https://api.modrinth.com/v2/project/limbo-server/version)"
      version_json="$(jq -ec '.[0]' <<<"${versions_json}")" || { echo "No Limbo release supports Minecraft ${MINECRAFT_VERSION}." >&2; exit 1; }
      download_url="$(jq -er '[.files[] | select(.primary == true)][0].url // .files[0].url' <<<"${version_json}")"
      expected_hash="$(jq -er '[.files[] | select(.primary == true)][0].hashes.sha512 // .files[0].hashes.sha512' <<<"${version_json}")"
      version="$(jq -er '.version_number' <<<"${version_json}")"
      curl -fL --retry 3 --retry-delay 2 -o "${SERVER_JARFILE}.part" "${download_url}"
      printf '%s  %s\n' "${expected_hash}" "${SERVER_JARFILE}.part" | sha512sum -c -
      mv -f "${SERVER_JARFILE}.part" "${SERVER_JARFILE}"

      mkdir -p plugins
      if [[ "${VIALIMBO_VERSION}" == "latest" ]]; then
        job_json="$(curl -fsSL https://ci.loohpjames.com/job/ViaLimbo/lastSuccessfulBuild/api/json)"
        plugin_marker="build $(jq -er '.number' <<<"${job_json}")"
        artifact="$(jq -er '.artifacts[0].relativePath' <<<"${job_json}")"
        plugin_url="https://ci.loohpjames.com/job/ViaLimbo/lastSuccessfulBuild/artifact/${artifact}"
        plugin_name="$(basename "${artifact}")"
      else
        plugin_marker="${VIALIMBO_VERSION}"
        plugin_name="ViaLimbo-${VIALIMBO_VERSION}.jar"
        plugin_url="https://repo.loohpjames.com/repository/com/loohp/ViaLimbo/${VIALIMBO_VERSION}/${plugin_name}"
      fi
      curl -fL --retry 3 --retry-delay 2 -o "plugins/${plugin_name}.part" "${plugin_url}"
      mv -f "plugins/${plugin_name}.part" "plugins/${plugin_name}"
      printf '%s\n' "limbo ${version} vialimbo ${plugin_marker}" > .egg-version
      echo "Installed Limbo ${version} and ViaLimbo ${plugin_marker}."
startup_commands:
  Default: bash -c printf\${IFS}%s\${IFS}\|base64\${IFS}-d\|gzip\${IFS}-d\|bash\${IFS}-s\${IFS}--\${IFS}java\${IFS}-Xms128M\${IFS}-XX:MaxRAMPercentage=95.0\${IFS}-Dterminal.jline=false\${IFS}-Dterminal.ansi=true\${IFS}-jar\${IFS}{{SERVER_JARFILE}}
force_outgoing_ip: false
separate_port: false
features:
- java_version
docker_images:
  Java 17: ghcr.io/pterodactyl/yolks:java_17
  Java 21: ghcr.io/pterodactyl/yolks:java_21
  Java 25: ghcr.io/pterodactyl/yolks:java_25
file_denylist: []
variables:
- name: Minecraft Version
  name_translations:
    uk: Версія Minecraft
  description: Minecraft protocol version served by Limbo.
  description_translations:
    uk: Версія протоколу Minecraft для Limbo.
  order: 0
  env_variable: MINECRAFT_VERSION
  default_value: 1.21.8
  user_viewable: true
  user_editable: true
  secret: false
  rules:
  - required
  - string
  - max:32
- name: ViaLimbo Version
  name_translations:
    uk: Версія ViaLimbo
  description: Exact ViaLimbo version or latest successful build.
  description_translations:
    uk: Точна версія ViaLimbo або latest успішна збірка.
  order: 1
  env_variable: VIALIMBO_VERSION
  default_value: latest
  user_viewable: true
  user_editable: true
  secret: false
  rules:
  - required
  - string
  - max:64
- name: Server Jar
  name_translations:
    uk: Файл сервера
  description: Installed Limbo jar filename.
  description_translations:
    uk: Назва jar-файлу Limbo.
  order: 2
  env_variable: SERVER_JARFILE
  default_value: limbo.jar
  user_viewable: true
  user_editable: true
  secret: false
  rules:
  - required
  - string
  - regex:/^[A-Za-z0-9._-]+\.jar$/
- name: Velocity Support
  name_translations:
    uk: Підтримка Velocity
  description: Enable modern Velocity forwarding.
  description_translations:
    uk: Увімкнути сучасний forwarding Velocity.
  order: 3
  env_variable: VELOCITY_ENABLED
  default_value: 'true'
  user_viewable: true
  user_editable: true
  secret: false
  rules:
  - required
  - boolean
- name: Velocity Secret
  name_translations:
    uk: Секрет Velocity
  description: Forwarding secret shared with Velocity.
  description_translations:
    uk: Спільний секрет forwarding із Velocity.
  order: 4
  env_variable: VELOCITY_SECRET
  default_value: change-me-now
  user_viewable: true
  user_editable: true
  secret: true
  rules:
  - required
  - string
  - min:8
  - max:256
- name: Automatic Core Updates
  name_translations:
    uk: Автоматичні оновлення ядра
  description: Check for and install the newest compatible Limbo and ViaLimbo builds before every server start, including fixed Minecraft versions.
  description_translations:
    uk: Перед кожним запуском перевіряти й встановлювати найновіші сумісні збірки Limbo та ViaLimbo, зокрема для фіксованих версій Minecraft.
  order: 5
  env_variable: AUTO_UPDATE
  default_value: 'true'
  user_viewable: true
  user_editable: true
  secret: false
  rules:
  - required
  - boolean
