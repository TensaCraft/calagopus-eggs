scripts:
  installation:
    container: ghcr.io/pelican-eggs/yolks:java_21
    entrypoint: bash
    content: |
      #!/bin/bash
      set -euo pipefail

      cd /mnt/server

      if [[ "${MINECRAFT_VERSION}" == "latest" ]]; then
        game_version="$(curl -fsSL https://meta.quiltmc.org/v3/versions/game | jq -er '[.[] | select(.stable == true)][0].version')"
      else
        game_version="${MINECRAFT_VERSION}"
      fi
      if [[ "${QUILT_LOADER_VERSION}" == "latest" ]]; then
        loader_version="$(curl -fsSL https://meta.quiltmc.org/v3/versions/loader | jq -er '[.[] | select(.version | contains("-") | not)][0].version')"
      else
        loader_version="${QUILT_LOADER_VERSION}"
      fi
      if [[ "${QUILT_INSTALLER_VERSION}" == "latest" ]]; then
        installer_json="$(curl -fsSL https://meta.quiltmc.org/v3/versions/installer | jq -ec '.[0]')"
      else
        installer_json="$(curl -fsSL https://meta.quiltmc.org/v3/versions/installer | jq -ec --arg version "${QUILT_INSTALLER_VERSION}" '[.[] | select(.version == $version)][0]')"
      fi
      installer_version="$(jq -er '.version' <<<"${installer_json}")"
      installer_url="$(jq -er '.url' <<<"${installer_json}")"
      expected_hash="$(curl -fsSL "${installer_url}.sha256")"
      curl -fL --retry 3 --retry-delay 2 -o quilt-installer.jar.part "${installer_url}"
      printf '%s  %s\n' "${expected_hash}" quilt-installer.jar.part | sha256sum -c -
      mv -f quilt-installer.jar.part quilt-installer.jar
      java -jar quilt-installer.jar install server "${game_version}" "${loader_version}" --install-dir=/mnt/server --download-server
      rm -f quilt-installer.jar
      [[ -s quilt-server-launch.jar ]] || { echo "Quilt launcher was not created." >&2; exit 1; }
      mkdir -p mods
      printf '%s\n' "${game_version} loader ${loader_version} installer ${installer_version}" > .egg-version
      echo "Installed Quilt ${game_version} with loader ${loader_version}."
startup_commands:
  Default: bash -c printf\${IFS}%s\${IFS}\|base64\${IFS}-d\|gzip\${IFS}-d\|bash\${IFS}-s\${IFS}--\${IFS}java\${IFS}-Xms128M\${IFS}-XX:MaxRAMPercentage=95.0\${IFS}-Dterminal.jline=false\${IFS}-Dterminal.ansi=true\${IFS}-jar\${IFS}quilt-server-launch.jar\${IFS}nogui
