scripts:
  installation:
    container: ghcr.io/pelican-eggs/yolks:java_21
    entrypoint: bash
    content: |
      #!/bin/bash
      set -euo pipefail

      cd /mnt/server

      metadata="$(curl -fsSL https://maven.neoforged.net/releases/net/neoforged/neoforge/maven-metadata.xml)"
      versions="$(grep -oE '<version>[^<]+</version>' <<<"${metadata}" | sed -E 's:</?version>::g')"
      if [[ "${NEOFORGE_VERSION}" == "latest" ]]; then
        if [[ "${MINECRAFT_VERSION}" == "latest" ]]; then
          version="$(grep -v -- '-' <<<"${versions}" | sort -V | tail -n1)"
        else
          case "${MINECRAFT_VERSION}" in
            1.*) prefix="${MINECRAFT_VERSION#1.}." ;;
            *.*.*) prefix="${MINECRAFT_VERSION}." ;;
            *.*) prefix="${MINECRAFT_VERSION}.0." ;;
            *) echo "Unsupported Minecraft version format: ${MINECRAFT_VERSION}" >&2; exit 1 ;;
          esac
          version="$(awk -v prefix="${prefix}" 'index($0, prefix) == 1' <<<"${versions}" | grep -v -- '-' | sort -V | tail -n1)"
        fi
      else
        version="${NEOFORGE_VERSION}"
      fi
      [[ -n "${version}" ]] || { echo "No stable NeoForge version matched the request." >&2; exit 1; }
      installer="neoforge-${version}-installer.jar"
      base_url="https://maven.neoforged.net/releases/net/neoforged/neoforge/${version}/${installer}"
      curl -fL --retry 3 --retry-delay 2 -o "${installer}.part" "${base_url}"
      expected_hash="$(curl -fsSL "${base_url}.sha256")"
      printf '%s  %s\n' "${expected_hash}" "${installer}.part" | sha256sum -c -
      mv -f "${installer}.part" "${installer}"
      java -jar "${installer}" --installServer
      rm -f "${installer}" "${installer}.log"
      args_file="$(find libraries/net/neoforged/neoforge -type f -name unix_args.txt -print | sort -V | tail -n1)"
      [[ -n "${args_file}" ]] || { echo "NeoForge unix_args.txt was not created." >&2; exit 1; }
      ln -sfn "${args_file}" unix_args.txt
      mkdir -p mods
      printf '%s\n' "${version}" > .egg-version
      echo "Installed NeoForge ${version}."
startup_commands:
  Default: bash -c printf\${IFS}%s\${IFS}\|base64\${IFS}-d\|gzip\${IFS}-d\|bash\${IFS}-s\${IFS}--\${IFS}java\${IFS}-Xms128M\${IFS}-XX:MaxRAMPercentage=95.0\${IFS}-Dterminal.jline=false\${IFS}-Dterminal.ansi=true\${IFS}@unix_args.txt\${IFS}nogui
