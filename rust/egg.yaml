  description_translations:
    uk: Опис у списку серверів Rust.
  order: 4
  env_variable: DESCRIPTION
  default_value: ''
  user_viewable: true
  user_editable: true
  secret: false
  rules:
  - nullable
  - string
  - max:1024
- name: Website URL
  name_translations:
    uk: URL сайту
  description: Optional server website URL.
  description_translations:
    uk: Необов'язковий URL сайту сервера.
  order: 5
  env_variable: SERVER_URL
  default_value: ''
  user_viewable: true
  user_editable: true
  secret: false
  rules:
  - nullable
  - url
- name: Header Image
  name_translations:
    uk: Зображення заголовка
  description: Optional direct URL to the server header image.
  description_translations:
    uk: Необов'язковий прямий URL зображення сервера.
  order: 6
  env_variable: SERVER_IMG
  default_value: ''
  user_viewable: true
  user_editable: true
  secret: false
  rules:
  - nullable
  - url
- name: Logo Image
  name_translations:
    uk: Логотип
  description: Optional direct URL to the server logo.
  description_translations:
    uk: Необов'язковий прямий URL логотипа сервера.
  order: 7
  env_variable: SERVER_LOGO
  default_value: ''
