  - max:128
- name: Identity
  name_translations:
    uk: Ідентифікатор
  description: Save directory identity.
  description_translations:
    uk: Ідентифікатор каталогу збережень.
  order: 9
  env_variable: SERVER_IDENTITY
  default_value: rust
  user_viewable: true
  user_editable: true
