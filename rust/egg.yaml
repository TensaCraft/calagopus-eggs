uuid: 898b7385-7f2b-4812-8f3b-41b6d6223b4c
name: Rust
description: A clean Rust Dedicated Server using the official Pterodactyl Rust image, SteamCMD installation, optional Carbon/Oxide
  support, and native Calagopus variables.
author: GIGABAIT
config:
  files: {}
  startup:
    done:
    - Server startup complete
    strip_ansi: false
  stop:
    type: command
    value: quit
scripts:
  installation:
    container: ghcr.io/pterodactyl/installers:debian
    entrypoint: bash
    content: |
      #!/bin/bash
      set -euo pipefail

      steam_archive="$(mktemp)"
      trap 'rm -f "${steam_archive}"' EXIT
      mkdir -p /mnt/server/steamcmd /mnt/server/steamapps
      curl -fL --retry 3 --retry-delay 2 -o "${steam_archive}" https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz
      tar -xzf "${steam_archive}" -C /mnt/server/steamcmd
      HOME=/mnt/server /mnt/server/steamcmd/steamcmd.sh +force_install_dir /mnt/server +login anonymous +app_update 258550 ${SRCDS_BETAID:+-beta ${SRCDS_BETAID}} validate +quit
      mkdir -p /mnt/server/.steam/sdk32 /mnt/server/.steam/sdk64
      cp /mnt/server/steamcmd/linux32/steamclient.so /mnt/server/.steam/sdk32/steamclient.so
      cp /mnt/server/steamcmd/linux64/steamclient.so /mnt/server/.steam/sdk64/steamclient.so
      mkdir -p /mnt/server/server
      echo "Installed Rust Dedicated Server."
startup_commands:
  Procedural Map: exec ./RustDedicated -batchmode -nographics +server.port {{SERVER_PORT}} +server.queryport {{QUERY_PORT}}
    +server.identity "{{SERVER_IDENTITY}}" +server.gamemode "{{GAMEMODE}}" +rcon.port {{RCON_PORT}} +rcon.ip 0.0.0.0 +rcon.web
    true +server.hostname "{{HOSTNAME}}" +server.description "{{DESCRIPTION}}" +server.url "{{SERVER_URL}}" +server.headerimage
    "{{SERVER_IMG}}" +server.logoimage "{{SERVER_LOGO}}" +server.maxplayers {{MAX_PLAYERS}} +rcon.password "{{RCON_PASS}}"
    +server.saveinterval {{SAVEINTERVAL}} +app.port {{APP_PORT}} +app.publicip "{{APP_PUBLIC_IP}}" +server.tags "{{SERVER_TAGS}}"
    -logfile logs/server.log +server.level "{{LEVEL}}" +server.worldsize {{WORLD_SIZE}} +server.seed "{{WORLD_SEED}}" {{ADDITIONAL_ARGS}}
  Custom Map: exec ./RustDedicated -batchmode -nographics +server.port {{SERVER_PORT}} +server.queryport {{QUERY_PORT}} +server.identity
    "{{SERVER_IDENTITY}}" +server.gamemode "{{GAMEMODE}}" +rcon.port {{RCON_PORT}} +rcon.ip 0.0.0.0 +rcon.web true +server.hostname
    "{{HOSTNAME}}" +server.description "{{DESCRIPTION}}" +server.url "{{SERVER_URL}}" +server.headerimage "{{SERVER_IMG}}"
    +server.logoimage "{{SERVER_LOGO}}" +server.maxplayers {{MAX_PLAYERS}} +rcon.password "{{RCON_PASS}}" +server.saveinterval
    {{SAVEINTERVAL}} +app.port {{APP_PORT}} +app.publicip "{{APP_PUBLIC_IP}}" +server.tags "{{SERVER_TAGS}}" -logfile logs/server.log
    +server.levelurl "{{MAP_URL}}" {{ADDITIONAL_ARGS}}
force_outgoing_ip: false
separate_port: false
features: []
docker_images:
  Rust: ghcr.io/pterodactyl/games:rust
file_denylist: []
variables:
- name: Modding Framework
  name_translations:
    uk: Фреймворк модифікацій
  description: Runtime framework managed by the official Pterodactyl Rust image.
  description_translations:
    uk: Фреймворк, яким керує офіційний Rust-образ Pterodactyl.
  order: 0
  env_variable: FRAMEWORK
  default_value: vanilla
  user_viewable: true
  user_editable: true
  secret: false
  rules:
  - required
  - string
  - in:vanilla,carbon,oxide
- name: Automatic Updates
  name_translations:
    uk: Автоматичні оновлення
  description: Update the stable Rust branch through SteamCMD when the official runtime image starts.
  description_translations:
    uk: Оновлювати стабільну гілку Rust через SteamCMD під час запуску офіційного runtime-образу.
  order: 1
  env_variable: AUTO_UPDATE
  default_value: '1'
  user_viewable: true
  user_editable: true
  secret: false
  rules:
  - required
  - boolean
- name: Steam Branch
  name_translations:
    uk: Гілка Steam
  description: Optional beta branch used during installation. Disable Automatic Updates for beta branches because the runtime
    updater targets stable.
  description_translations:
    uk: Необов'язкова beta-гілка для встановлення. Для beta-гілок вимкніть автоматичні оновлення, бо runtime-updater оновлює
      stable.
  order: 2
  env_variable: SRCDS_BETAID
  default_value: ''
  user_viewable: true
  user_editable: true
  secret: false
  rules:
  - nullable
  - string
  - max:64
- name: Server Name
  name_translations:
    uk: Назва сервера
  description: Name displayed in the Rust server list.
  description_translations:
    uk: Назва у списку серверів Rust.
  order: 3
  env_variable: HOSTNAME
  default_value: A Rust Server
  user_viewable: true
  user_editable: true
  secret: false
  rules:
  - required
  - string
  - max:64
- name: Description
  name_translations:
    uk: Опис
