scripts:
  installation:
    container: ghcr.io/pterodactyl/installers:debian
    entrypoint: bash
    content: |
      #!/bin/bash
      set -euo pipefail

      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y --no-install-recommends jq ca-certificates
      rm -rf /var/lib/apt/lists/*
      cd /mnt/server
      if [[ "${MINECRAFT_VERSION}" == "latest" ]]; then
        version="$(curl -fsSL https://api.mohistmc.com/project/youer/versions | jq -er '.[0].name')"
      else
        version="${MINECRAFT_VERSION}"
      fi
      builds_json="$(curl -fsSL "https://api.mohistmc.com/project/youer/${version}/builds")"
      if [[ "${YOUER_BUILD}" == "latest" ]]; then
        build_json="$(jq -ec '.[0]' <<<"${builds_json}")"
      else
        build_json="$(jq -ec --arg build "${YOUER_BUILD}" '[.[] | select((.id | tostring) == $build)][0]' <<<"${builds_json}")"
      fi
      build_id="$(jq -er '.id' <<<"${build_json}")"
      expected_hash="$(jq -er '.file_sha256' <<<"${build_json}")"
      curl -fL --retry 3 --retry-delay 2 -o "${SERVER_JARFILE}.part" "https://api.mohistmc.com/project/youer/${version}/builds/${build_id}/download"
      printf '%s  %s\n' "${expected_hash}" "${SERVER_JARFILE}.part" | sha256sum -c -
      mv -f "${SERVER_JARFILE}.part" "${SERVER_JARFILE}"
      printf '%s\n' "${version} build ${build_id}" > .egg-version
      echo "Installed Youer ${version} build ${build_id}."
startup_commands:
  Default: bash -c printf\${IFS}%s\${IFS}\|base64\${IFS}-d\|gzip\${IFS}-d\|bash\${IFS}-s\${IFS}--\${IFS}java\${IFS}-Xms128M\${IFS}-Xmx{{SERVER_MEMORY}}M\${IFS}-Dterminal.jline=false\${IFS}-Dterminal.ansi=true\${IFS}-jar\${IFS}{{SERVER_JARFILE}}\${IFS}nogui
  Aikar G1GC: bash -c printf\${IFS}%s\${IFS}\|base64\${IFS}-d\|gzip\${IFS}-d\|bash\${IFS}-s\${IFS}--\${IFS}java\${IFS}-Xms128M\${IFS}-Xmx{{SERVER_MEMORY}}M\${IFS}-XX:+UseG1GC\${IFS}-XX:+ParallelRefProcEnabled\${IFS}-XX:MaxGCPauseMillis=200\${IFS}-XX:+UnlockExperimentalVMOptions\${IFS}-XX:+DisableExplicitGC\${IFS}-XX:+AlwaysPreTouch\${IFS}-XX:G1NewSizePercent=30\${IFS}-XX:G1MaxNewSizePercent=40\${IFS}-XX:G1HeapRegionSize=8M\${IFS}-XX:G1ReservePercent=20\${IFS}-XX:G1HeapWastePercent=5\${IFS}-XX:G1MixedGCCountTarget=4\${IFS}-XX:InitiatingHeapOccupancyPercent=15\${IFS}-XX:G1MixedGCLiveThresholdPercent=90\${IFS}-XX:G1RSetUpdatingPauseTimePercent=5\${IFS}-XX:SurvivorRatio=32\${IFS}-XX:+PerfDisableSharedMem\${IFS}-XX:MaxTenuringThreshold=1\${IFS}-Dusing.aikars.flags=https://mcflags.emc.gs\${IFS}-Daikars.new.flags=true\${IFS}-Dterminal.jline=false\${IFS}-Dterminal.ansi=true\${IFS}-jar\${IFS}{{SERVER_JARFILE}}\${IFS}nogui
